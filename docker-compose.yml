services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data/podclean
      - ./.env:/app/.env  # mounted for backup/restore
    depends_on:
      - redis
    restart: unless-stopped
    command: ./entrypoint.sh

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./data:/data/podclean
      - ./.env:/app/.env  # mounted for backup/restore
    depends_on:
      - redis
    restart: unless-stopped
    command: celery -A celery_app worker --loglevel=info --concurrency=1

  worker-gpu:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    profiles: [gpu]
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./data:/data/podclean
      - ./.env:/app/.env  # mounted for backup/restore
    depends_on:
      - redis
    restart: unless-stopped
    command: celery -A celery_app worker --loglevel=info --concurrency=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_GPU=${OLLAMA_NUM_GPU:-0}

  ollama-gpu:
    image: ollama/ollama:latest
    profiles: [gpu]
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_GPU=${OLLAMA_NUM_GPU:-99}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  redis_data:
  ollama_data:
